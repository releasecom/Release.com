<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Forge</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #0d0d0d; /* Obsidian Black */
            font-family: 'Courier New', Courier, monospace;
            touch-action: none;
        }
        canvas { display: block; filter: contrast(1.5) brightness(0.8); }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; z-index: 10;
        }
        .instruction-text { 
            color: rgba(255,255,255,0.2); font-size: 14px; 
            letter-spacing: 8px; text-transform: uppercase; 
            border: 1px solid rgba(255,255,255,0.1); padding: 20px;
            text-align: center;
            line-height: 1.6;
            transition: opacity 1s;
        }
        .back-link {
            position: absolute; bottom: 40px; pointer-events: auto; 
            color: rgba(255,255,255,0.3); text-decoration: none; font-size: 10px;
            letter-spacing: 3px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="instruction-text" id="hint">FIND YOUR RHYTHM.<br>STRIKE TO ACTIVATE.</div>
        <a href="index.html" class="back-link">← Return to Sanctuary</a>
    </div>

    <canvas id="forgeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('forgeCanvas');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');
        
        let particles = [];
        let audioCtx;
        let oscillator;
        let gainNode;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Refined Particle Class (Cooling Embers)
        class Ember {
            constructor(x, y, power) {
                this.x = x;
                this.y = y;
                // Still forceful vx/vy
                this.vx = (Math.random() - 0.5) * power;
                this.vy = (Math.random() - 0.5) * power;
                this.radius = Math.random() * 8 + 3;
                this.life = 1.0;
                this.decay = 0.015 + Math.random() * 0.03;
                
                // Color Logic - Transmutation Path: Deep Blue -> Moss Green
                // We use HSL for a smooth fade rather than RGB.
                this.hueStart = 200; // Starting Deep Blue
                this.hueEnd = 130; // Ending Moss Green
                this.sat = Math.random() * 50 + 50; // Random Saturation
                this.light = Math.random() * 20 + 30; // Random Light
            }
            draw() {
                // Calculate current hue based on life percentage
                const currentHue = this.hueEnd + (this.hueStart - this.hueEnd) * this.life;
                
                // The particle glows more intensely when new (higher lightness)
                const currentLight = this.light + (50 * this.life);
                
                ctx.fillStyle = `hsla(${currentHue}, ${this.sat}%, ${currentLight}%, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05; // Added gravity for 'ash' feel
                this.vx *= 0.98; // Air resistance
                this.life -= this.decay;
            }
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(40, audioCtx.currentTime); // 40Hz
            
            // Set initial gain to 0 (mute)
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        function handleImpact(x, y) {
            if (!audioCtx) {
                initAudio();
                hint.style.opacity = 0;
            }

            // Pulse the audio volume on impact (A quick 'hit' followed by a thrum)
            gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); // Quick hit
            gainNode.gain.exponentialRampToValueAtTime(0.02, audioCtx.currentTime + 1.2); // Slower thrum fade

            // Create 'Cooling Embers' (A distinct shape rather than a chaotic spark)
            for (let i = 0; i < 25; i++) {
                particles.push(new Ember(x, y, 18));
            }
        }

        function animate() {
            ctx.fillStyle = '#0d0d0d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Cleanly draw and splice particles
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('mousedown', e => handleImpact(e.clientX, e.clientY));
        window.addEventListener('touchstart', e => {
            const touch = e.touches[0];
            handleImpact(touch.clientX, touch.clientY);
        });
    </script>
</body>
</html>
