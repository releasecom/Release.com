<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Forge</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #080a0c; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        canvas { display: block; filter: blur(15px) contrast(1.2); }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
        .instruction-text { color: rgba(255,255,255,0.15); font-size: 11px; letter-spacing: 6px; text-transform: uppercase; text-align: center; line-height: 2; transition: opacity 1s; }
        .back-link { position: absolute; bottom: 40px; pointer-events: auto; color: rgba(255,255,255,0.2); text-decoration: none; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="instruction-text" id="hint">EXPEL THE WEIGHT<br>DRAG OR USE ARROWS<br>SPACE TO BREATHE</div>
        <a href="index.html" class="back-link">← Return to Sanctuary</a>
    </div>
    <canvas id="forgeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('forgeCanvas'), ctx = canvas.getContext('2d'), hint = document.getElementById('hint');
        let particles = [], audioCtx, interactionStarted = false;
        let isMouseDown = false;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function startForge() {
            if (interactionStarted) return;
            interactionStarted = true;
            hint.style.opacity = 0;
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            
            audioCtx = new AudioContext();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(174, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
        }

        class Plume {
            constructor(x, y, vx, vy, isSpecial = false) {
                this.x = x; this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = isSpecial ? 100 : Math.random() * 40 + 30;
                this.life = 1.0;
                // Strict decay ensures it always disappears
                this.decay = isSpecial ? 0.003 : 0.006; 
                this.gravity = 0.02; 
                this.color = Math.random() > 0.5 ? '#3a5a40' : '#415a77'; 
            }
            draw() {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life * 0.5;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
            update() { 
                this.vy += this.gravity; 
                this.x += this.vx; 
                this.y += this.vy; 
                this.life -= this.decay; 
                this.radius += 0.3; 

                // Floor collision but keep decaying
                if (this.y > canvas.height) {
                    this.y = canvas.height;
                    this.vx *= 0.9;
                    this.vy = 0;
                }
            }
        }

        function spawn(x, y, vx, vy, special = false) {
            if (!interactionStarted) return;
            particles.push(new Plume(x, y, vx, vy, special));
        }

        function animate() {
            // Clear frame
            ctx.fillStyle = '#080a0c'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Filter out dead particles every frame
            particles = particles.filter(p => p.life > 0);

            particles.forEach(p => {
                p.update(); 
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('mousedown', () => { startForge(); isMouseDown = true; });
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', e => {
            if(isMouseDown) spawn(e.clientX, e.clientY, (Math.random()-0.5)*2, -2);
        });

        window.addEventListener('keydown', e => {
            if (!interactionStarted) startForge();
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            if (e.code === 'Space') spawn(centerX, centerY, 0, -1, true);
            if (e.code === 'ArrowUp') spawn(centerX, centerY + 100, 0, -5);
            if (e.code === 'ArrowDown') spawn(centerX, centerY - 100, 0, 5);
            if (e.code === 'ArrowLeft') spawn(centerX + 100, centerY, -5, 0);
            if (e.code === 'ArrowRight') spawn(centerX - 100, centerY, 5, 0);
        });

        window.addEventListener('touchstart', (e) => { startForge(); isMouseDown = true; });
        window.addEventListener('touchend', () => isMouseDown = false);
        window.addEventListener('touchmove', e => {
            if(isMouseDown) {
                const t = e.touches[0];
                spawn(t.clientX, t.clientY, (Math.random()-0.5)*2, -2);
            }
        });
    </script>
</body>
</html>
