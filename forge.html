<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Forge</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0a0a0a; font-family: sans-serif; touch-action: none; }
        canvas { display: block; filter: blur(15px) contrast(1.2); }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
        .instruction-text { color: rgba(255,255,255,0.2); font-size: 12px; letter-spacing: 8px; text-transform: uppercase; text-align: center; }
        .back-link { position: absolute; bottom: 40px; pointer-events: auto; color: rgba(255,255,255,0.3); text-decoration: none; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="instruction-text" id="hint">EXPEL THE WEIGHT<br>TAP TO ACTIVATE</div>
        <a href="index.html" class="back-link">← Return</a>
    </div>
    <canvas id="forgeCanvas"></canvas>
    <script>
        const canvas = document.getElementById('forgeCanvas'), ctx = canvas.getContext('2d'), hint = document.getElementById('hint');
        let particles = [], audioCtx, interactionStarted = false;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function startForge() {
            if (interactionStarted) return;
            interactionStarted = true;
            hint.style.opacity = 0;
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            audioCtx = new AudioContext();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(174, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
        }

        class Plume {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = -Math.random() * 5; // Constantly expelling upwards
                this.radius = Math.random() * 60 + 20;
                this.life = 1.0;
                this.color = Math.random() > 0.5 ? '#1a3a4a' : '#2d3d2a'; // Deep Blue / Moss
            }
            draw() {
                ctx.globalAlpha = this.life * 0.4;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= 0.005; this.radius += 0.5; }
        }

        function handleExpel(x, y) {
            if (!interactionStarted) return;
            for (let i = 0; i < 3; i++) particles.push(new Plume(x, y));
        }

        function animate() {
            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => { p.update(); p.draw(); if (p.life <= 0) particles.splice(i, 1); });
            requestAnimationFrame(animate);
        }
        animate();
        window.addEventListener('mousedown', startForge);
        window.addEventListener('mousemove', e => handleExpel(e.clientX, e.clientY));
        window.addEventListener('touchstart', startForge);
        window.addEventListener('touchmove', e => handleExpel(e.touches[0].clientX, e.touches[0].clientY));
    </script>
</body>
</html>
