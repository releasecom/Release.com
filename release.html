<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Release</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #ui-container {
            position: absolute;
            right: 40px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 280px;
            z-index: 10;
            transition: opacity 1s ease;
        }

        h2 { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; opacity: 0.8; }
        label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 10px; opacity: 0.6; }

        input[type="range"] { width: 100%; margin-bottom: 25px; accent-color: #fff; }
        select { width: 100%; padding: 10px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; margin-bottom: 30px; }

        button {
            width: 100%;
            padding: 15px;
            background: white;
            color: black;
            border: none;
            border-radius: 10px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover { background: #e0e0e0; transform: scale(1.02); }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .back-link {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            text-decoration: none;
            color: white;
            opacity: 0.3;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h2>Size Your Stressor</h2>
        
        <label>Intensity</label>
        <input type="range" id="sizeSlider" min="50" max="250" value="150">

        <label>Release Timer</label>
        <select id="timerSelect">
            <option value="15">15 Seconds</option>
            <option value="30" selected>30 Seconds</option>
            <option value="60">1 Minute</option>
        </select>

        <button id="startBtn">Begin Release</button>
    </div>

    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <a href="index.html" class="back-link">← Return to Sanctuary</a>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const ui = document.getElementById('ui-container');
        const sizeSlider = document.getElementById('sizeSlider');
        const timerSelect = document.getElementById('timerSelect');

        let audioCtx;
        let isReleasing = false;
        let bubble = { x: 0, y: 0, radius: 0, alpha: 0 };
        let startTime;
        let duration;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function startSession() {
            // Full Screen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            // Audio Frequency (417 Hz)
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(417, audioCtx.currentTime);
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 2);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
            }

            // Setup Release
            isReleasing = true;
            ui.style.opacity = '0';
            setTimeout(() => ui.style.display = 'none', 1000);

            duration = parseInt(timerSelect.value) * 1000;
            startTime = Date.now();
            
            bubble = {
                x: canvas.width / 2,
                y: canvas.height / 2,
                radius: parseInt(sizeSlider.value),
                alpha: 0.6
            };

            animate();
        }

        function drawBubble() {
            let elapsed = Date.now() - startTime;
            let progress = elapsed / duration;

            if (progress >= 1) {
                bubble.alpha = 0;
                isReleasing = false;
                return;
            }

            // The "Dissolve" logic
            let currentRadius = bubble.radius * (1 + progress * 0.5);
            let currentAlpha = bubble.alpha * (1 - progress);

            // Create the glowing orb
            let gradient = ctx.createRadialGradient(
                bubble.x, bubble.y, 0,
                bubble.x, bubble.y, currentRadius
            );
            gradient.addColorStop(0, `rgba(173, 216, 230, ${currentAlpha})`);
            gradient.addColorStop(1, `rgba(173, 216, 230, 0)`);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.filter = 'blur(40px)';
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(bubble.x, bubble.y, currentRadius, 0, Math.PI * 2);
            ctx.fill();
        }

        function animate() {
            if (!isReleasing) return;
            drawBubble();
            requestAnimationFrame(animate);
        }

        startBtn.addEventListener('click', startSession);
    </script>
</body>
</html>
