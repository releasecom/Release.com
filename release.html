<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Release Space</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --shape-color: radial-gradient(circle, #a1c4fd 0%, #c2e9fb 100%);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #shape-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
        }

        #release-shape {
            background: var(--shape-color);
            border-radius: 50%;
            filter: blur(30px);
            box-shadow: 0 0 50px rgba(161, 196, 253, 0.5);
            transition: width 0.1s linear, height 0.1s linear, opacity 0.1s linear;
            animation: pulse 5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        #controls {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }
        input[type=range] { width: 150px; cursor: pointer; }

        select { 
            background: #161b22; 
            color: white; 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 4px; 
            padding: 5px;
        }

        button {
            margin-top: 10px;
            cursor: pointer;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #ffffff;
            color: #0b0e14;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            background: #f0f0f0;
            transform: translateY(-1px);
        }

        .back-link {
            position: absolute;
            bottom: 25px;
            font-size: 10px;
            text-decoration: none;
            color: white;
            opacity: 0.3;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: opacity 0.3s;
        }

        .back-link:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="shape-container">
        <div id="release-shape"></div>
    </div>

    <div id="controls">
        <label>Size your stressor</label>
        <input type="range" id="sizeSlider" min="0" max="800" value="400">
        
        <label>Release Timer</label>
        <select id="timerSelect">
            <option value="30">30 Seconds</option>
            <option value="300">5 Minutes</option>
            <option value="900">15 Minutes</option>
        </select>

        <button id="startBtn">begin release</button>
    </div>

    <a href="index.html" class="back-link">← Return to Sanctuary</a>

    <script>
        const shape = document.getElementById('release-shape');
        const sizeSlider = document.getElementById('sizeSlider');
        const timerSelect = document.getElementById('timerSelect');
        const startBtn = document.getElementById('startBtn');

        let releaseInterval;
        let audioCtx;
        const MAX_VAL = 800;

        function updateVisuals(sliderValue) {
            let actualSize = MAX_VAL - sliderValue;
            shape.style.width = actualSize + 'px';
            shape.style.height = actualSize + 'px';
            let opacityValue = (actualSize / MAX_VAL);
            shape.style.opacity = actualSize <= 0 ? 0 : opacityValue;
        }

        function startAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let oscillator = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(417, audioCtx.currentTime); // 417Hz Change Frequency
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 2); // Soft fade in
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        sizeSlider.addEventListener('input', () => {
            clearInterval(releaseInterval);
            updateVisuals(sizeSlider.value);
        });

        startBtn.addEventListener('click', () => {
            // Trigger Full Screen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            // Start 417Hz Audio
            startAudio();

            clearInterval(releaseInterval);
            
            let duration = parseInt(timerSelect.value);
            let currentSliderPos = parseFloat(sizeSlider.value);
            let distanceToCover = MAX_VAL - currentSliderPos;
            
            if (distanceToCover <= 0) return; 

            const intervalMs = 100; 
            const totalSteps = (duration * 1000) / intervalMs;
            const incrementPerStep = distanceToCover / totalSteps;

            releaseInterval = setInterval(() => {
                currentSliderPos += incrementPerStep;
                
                if (currentSliderPos >= MAX_VAL) {
                    currentSliderPos = MAX_VAL;
                    clearInterval(releaseInterval);
                }
                
                sizeSlider.value = currentSliderPos;
                updateVisuals(currentSliderPos);
            }, intervalMs);
        });

        updateVisuals(400);
    </script>
</body>
</html>
