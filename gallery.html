<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Liminal Gallery</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f8f8f6; }
        canvas { display: block; width: 100vw; height: 100vh; filter: blur(12px) contrast(1.1); }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; transition: opacity 3s ease; font-family: sans-serif; z-index: 10;
        }
        .instruction-text { color: rgba(0,0,0,0.15); font-size: 10px; letter-spacing: 5px; text-transform: uppercase; user-select: none; }
        .back-link {
            position: absolute; bottom: 40px; pointer-events: auto; 
            color: rgba(0,0,0,0.2); text-decoration: none; font-size: 10px;
            letter-spacing: 2px; text-transform: uppercase; z-index: 20;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="instruction-text" id="hint">Enter the space</div>
        <a href="index.html" class="back-link">← Return to Sanctuary</a>
    </div>

    <canvas id="fluidCanvas"></canvas>

    <script src="https://unpkg.com/webgl-fluid-simulation@1.0.1/dist/webgl-fluid-simulation.js"></script>

    <script>
        // Check if the engine loaded properly
        if (typeof WebGLFluid === 'undefined') {
            alert("The Gallery Engine failed to load. Please check your internet connection or GitHub settings.");
        }

        const canvas = document.querySelector('canvas');
        const hint = document.getElementById('hint');
        
        const fluid = WebGLFluid(canvas, {
            COLORFUL: false,
            DENSITY_DISSIPATION: 2.0,
            CURL: 2,
            SPLAT_RADIUS: 0.3,
            BACK_COLOR: { r: 0.97, g: 0.97, b: 0.96 },
            BLOOM: true
        });

        let interactionStarted = false;

        function getDiagnosticColor(speed) {
            if (speed > 40) return [0.1, 0.4, 0.5]; // Teal
            if (speed > 15) return [0.5, 0.5, 0.7]; // Lavender
            return [0.8, 0.6, 0.3]; // Honey
        }

        function handleInteraction(x, y, dx, dy) {
            if (!interactionStarted) {
                interactionStarted = true;
                hint.style.opacity = 0;
            }

            const speed = Math.sqrt(dx*dx + dy*dy);
            const rgb = getDiagnosticColor(speed);

            fluid.splat(
                x / window.innerWidth,
                1.0 - y / window.innerHeight,
                dx * 5,
                dy * -5,
                rgb[0], rgb[1], rgb[2]
            );
        }

        window.addEventListener('mousemove', e => handleInteraction(e.clientX, e.clientY, e.movementX, e.movementY));
        
        window.addEventListener('touchmove', e => {
            const touch = e.touches[0];
            const dx = touch.clientX - (window.lastX || touch.clientX);
            const dy = touch.clientY - (window.lastY || touch.clientY);
            window.lastX = touch.clientX; window.lastY = touch.clientY;
            handleInteraction(touch.clientX, touch.clientY, dx, dy);
        }, { passive: false });
    </script>
</body>
</html>
