<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liminal Void</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f8f8f6; touch-action: none; }
        canvas { display: block; filter: blur(3px); } 
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
        .instruction-text { color: rgba(0,0,0,0.1); font-size: 10px; letter-spacing: 6px; text-transform: uppercase; }
        .back-link { position: absolute; bottom: 40px; pointer-events: auto; color: rgba(0,0,0,0.2); text-decoration: none; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="instruction-text" id="hint">Click to Ripple the Void</div>
        <a href="index.html" class="back-link">← Return</a>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');
        let ripples = [], interactionStarted = false, lastX = null, lastY = null, speedBuffer = [], audioCtx;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function startAudio() {
            if (audioCtx) return;
            audioCtx = new AudioContext();
            const bufferSize = 2 * audioCtx.sampleRate;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }
            const whiteNoise = audioCtx.createBufferSource();
            whiteNoise.buffer = noiseBuffer; whiteNoise.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.setValueAtTime(432, audioCtx.currentTime);
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 3);
            whiteNoise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            whiteNoise.start();
        }

        class Ripple {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.radius = 1;
                this.color = color;
                this.alpha = 0.5;
            }
            update() {
                this.radius += 8; // Faster expansion to fill screen
                this.alpha -= 0.003; // Lasts longer
            }
            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2; // Thin, elegant rings
                ctx.globalAlpha = this.alpha;
                ctx.stroke();
                ctx.restore();
            }
        }

        function getColor(dx, dy) {
            const speed = Math.sqrt(dx*dx + dy*dy);
            speedBuffer.push(speed);
            if (speedBuffer.length > 20) speedBuffer.shift();
            const avg = speedBuffer.reduce((a,b)=>a+b, 0) / speedBuffer.length;
            if (avg > 30) return '#215c71'; 
            if (avg > 12) return '#8181b5';
            if (avg > 4)  return '#94a78c'; 
            return '#ccb28a';
        }

        function spawn(x, y) {
            if (!interactionStarted) { 
                interactionStarted = true; hint.style.opacity = 0; startAudio(); 
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            }
            const dx = x - (lastX || x); const dy = y - (lastY || y);
            ripples.push(new Ripple(x, y, getColor(dx, dy)));
            lastX = x; lastY = y;
        }

        function animate() {
            ctx.fillStyle = '#f8f8f6'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ripples = ripples.filter(r => r.alpha > 0);
            ripples.forEach(r => { r.update(); r.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
        window.addEventListener('mousedown', e => spawn(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => { if(interactionStarted) spawn(e.clientX, e.clientY); });
        window.addEventListener('touchstart', e => { spawn(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchmove', e => { spawn(e.touches[0].clientX, e.touches[0].clientY); });
    </script>
</body>
</html>
