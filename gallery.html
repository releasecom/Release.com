<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Liminal Gallery</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f8f8f6; /* The Neutral/White Start */
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            /* Creates the soft, watercolor/ink-in-milk look */
            filter: blur(12px) contrast(1.1) brightness(1.05);
        }

        #ui-layer {
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Allows mouse/touch to pass through to the fluid simulation */
            pointer-events: none; 
            transition: opacity 3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            z-index: 10;
        }

        .instruction-text {
            color: rgba(0,0,0,0.15);
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 40px;
            user-select: none;
        }

        .back-link {
            position: absolute;
            bottom: 40px;
            /* IMPORTANT: Tells the link to be clickable despite the UI layer */
            pointer-events: auto; 
            color: rgba(0,0,0,0.2);
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .back-link:hover {
            color: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="instruction-text" id="hint">Enter the space</div>
        <a href="index.html" class="back-link">← Return to Release</a>
    </div>

    <canvas id="fluidCanvas"></canvas>

    <script src="https://webgl-funs.github.io/webgl-fluid/dist/webgl-fluid.js"></script>

    <script>
        const canvas = document.getElementById('fluidCanvas');
        const hint = document.getElementById('hint');

        // Setup the fluid simulation
        const fluid = window.WebGLFluid(canvas, {
            IMMEDIATE: true,
            TRIGGER: 'hover',
            SIM_RESOLUTION: 128,
            DYE_RESOLUTION: 1024,
            DENSITY_DISSIPATION: 2.0, 
            VELOCITY_DISSIPATION: 1.2,
            PRESSURE: 0.8,
            CURL: 2, 
            SPLAT_RADIUS: 0.3,
            SHADING: false, 
            COLORFUL: false,
            BACK_COLOR: { r: 0.97, g: 0.97, b: 0.96 }, 
            BLOOM: true,
            BLOOM_INTENSITY: 0.2,
            SUNRAYS: false,
        });

        let interactionStarted = false;
        let speedBuffer = [];

        // Determine color based on user interaction speed
        function getDiagnosticColor(speed) {
            speedBuffer.push(speed);
            if (speedBuffer.length > 40) speedBuffer.shift();
            const avg = speedBuffer.reduce((a, b) => a + b, 0) / speedBuffer.length;

            if (avg > 40) {
                return { r: 0.1, g: 0.4, b: 0.5 }; // Deep Sea Teal
            } else if (avg > 15) {
                return { r: 0.5, g: 0.5, b: 0.7 }; // Soft Lavender
            } else {
                return { r: 0.8, g: 0.6, b: 0.3 }; // Warm Honey
            }
        }

        const handleInteraction = (x, y, dx, dy) => {
            if (!interactionStarted) {
                interactionStarted = true;
                hint.style.opacity = 0;
            }

            const speed = Math.sqrt(dx*dx + dy*dy);
