<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Liminal Gallery</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f8f8f6; touch-action: none; }
        /* Softened blur for a clean watercolor effect */
        canvas { display: block; filter: blur(5px); } 
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; font-family: sans-serif; z-index: 10;
        }
        .instruction-text { color: rgba(0,0,0,0.1); font-size: 10px; letter-spacing: 5px; text-transform: uppercase; transition: opacity 1s; }
        .back-link {
            position: absolute; bottom: 40px; pointer-events: auto; 
            color: rgba(0,0,0,0.2); text-decoration: none; font-size: 10px;
            letter-spacing: 2px; text-transform: uppercase; z-index: 20;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="instruction-text" id="hint">Stir the void</div>
        <a href="index.html" class="back-link">← Return to Sanctuary</a>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');
        
        let particles = [];
        let interactionStarted = false;
        let lastX = null;
        let lastY = null;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.radius = 45; // Fixed size for consistent feel
                this.color = color;
                this.alpha = 1;
                this.decay = 0.008; // How slow the 'paint' dries
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                this.alpha -= this.decay;
            }
        }

        function handleMove(x, y) {
            if (!interactionStarted) {
                interactionStarted = true;
                hint.style.opacity = 0;
            }

            // Diagnostic Color: Based on how far you moved (speed)
            let color = '#d4b483'; // Calm Ochre
            if (lastX !== null) {
                const dx = x - lastX;
                const dy = y - lastY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 30) color = '#2a5a6b'; // Deep Teal (Fast)
                else if (dist > 10) color = '#8a8ab0'; // Muted Lavender (Medium)
            }

            particles.push(new Particle(x, y, color));
            lastX = x;
            lastY = y;
        }

        function animate() {
            // Clean the canvas every frame
            ctx.fillStyle = '#f8f8f6';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }

        animate();

        // Direct listeners
        window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        window.addEventListener('touchmove', e => {
            const touch = e.touches[0];
            handleMove(touch.clientX, touch.clientY);
        });

    </script>
</body>
</html>
