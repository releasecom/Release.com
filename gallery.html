<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liminal Void</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #f8f8f6; touch-action: none; 
        }
        
        /* Softer blur for the ripple effect */
        canvas { display: block; filter: blur(4px); } 

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; font-family: 'Segoe UI', sans-serif; z-index: 10;
        }

        .instruction-text { 
            color: rgba(0,0,0,0.1); font-size: 10px; letter-spacing: 5px; 
            text-transform: uppercase; transition: opacity 1.5s ease; 
        }

        .back-link {
            position: absolute; bottom: 40px; pointer-events: auto; 
            color: rgba(0,0,0,0.2); text-decoration: none; font-size: 10px;
            letter-spacing: 2px; text-transform: uppercase; z-index: 20;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="instruction-text" id="hint">Click to Enter & Radiate</div>
        <a href="index.html" class="back-link">← Return to Sanctuary</a>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');
        
        let ripples = [];
        let interactionStarted = false;
        let lastX = null;
        let lastY = null;
        let speedBuffer = [];
        let audioCtx;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function startExperience() {
            if (interactionStarted) return;
            interactionStarted = true;
            hint.style.opacity = 0;
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            
            // Audio Engine: Universal Hiss
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = 2 * audioCtx.sampleRate;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }
            const whiteNoise = audioCtx.createBufferSource();
            whiteNoise.buffer = noiseBuffer;
            whiteNoise.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(432, audioCtx.currentTime); 
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 3);
            whiteNoise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            whiteNoise.start();
        }

        class Ripple {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.radius = 10; 
                this.maxRadius = 150 + Math.random() * 100;
                this.color = color;
                this.alpha = 0.6;
                this.lineWidth = 15;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.lineWidth;
                ctx.globalAlpha = this.alpha;
                ctx.stroke();
            }
            update() {
                this.radius += 2.5; // Expanding speed
                this.alpha -= 0.008; // Fading speed
                this.lineWidth *= 0.98; // Getting thinner as it expands
            }
        }

        function getColor(dx, dy) {
            const speed = Math.sqrt(dx*dx + dy*dy);
            speedBuffer.push(speed);
            if (speedBuffer.length > 25) speedBuffer.shift();
            const avg = speedBuffer.reduce((a, b) => a + b, 0) / speedBuffer.length;

            if (avg > 35) return '#215c71'; // Sea Teal
            if (avg > 15) return '#8181b5'; // Muted Violet
            if (avg > 5)  return '#94a78c'; // Moss Green
