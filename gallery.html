<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liminal Void</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f8f8f6; touch-action: none; }
        canvas { display: block; filter: blur(7px); } 
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; font-family: sans-serif; z-index: 10; }
        .instruction-text { color: rgba(0,0,0,0.1); font-size: 10px; letter-spacing: 5px; text-transform: uppercase; }
        .back-link { position: absolute; bottom: 40px; pointer-events: auto; color: rgba(0,0,0,0.2); text-decoration: none; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; z-index: 20; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="instruction-text" id="hint">Click to Enter & Expand</div>
        <a href="index.html" class="back-link">← Return</a>
    </div>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');
        let particles = [], interactionStarted = false, lastX = null, lastY = null, speedBuffer = [], audioCtx;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function startExperience() {
            if (interactionStarted) return;
            interactionStarted = true;
            hint.style.opacity = 0;
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            audioCtx = new AudioContext();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(432, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
        }

        class Particle {
            constructor(x, y, color) { this.x = x; this.y = y; this.radius = 50; this.color = color; this.alpha = 1; this.decay = 0.008; }
            draw() { ctx.globalAlpha = this.alpha; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); }
            update() { this.alpha -= this.decay; }
        }

        function getColor(dx, dy) {
            const speed = Math.sqrt(dx*dx + dy*dy);
            speedBuffer.push(speed);
            if (speedBuffer.length > 30) speedBuffer.shift();
            const avg = speedBuffer.reduce((a, b) => a + b, 0) / speedBuffer.length;
            if (avg > 35) return '#215c71'; // Teal
            if (avg > 15) return '#8181b5'; // Violet
            if (avg > 5) return '#94a78c';  // Moss Green
            return '#ccb28a';              // Honey
        }

        function handleMove(x, y) {
            if (!interactionStarted) return;
            if (lastX !== null) {
                const color = getColor(x - lastX, y - lastY);
                particles.push(new Particle(x, y, color));
            }
            lastX = x; lastY = y;
        }

        function animate() {
            ctx.fillStyle = '#f8f8f6'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => { p.update(); p.draw(); if (p.alpha <= 0) particles.splice(i, 1); });
            requestAnimationFrame(animate);
        }
        animate();
        window.addEventListener('mousedown', startExperience);
        window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        window.addEventListener('touchstart', startExperience);
        window.addEventListener('touchmove', e => handleMove(e.touches[0].clientX, e.touches[0].clientY));
    </script>
</body>
</html>
