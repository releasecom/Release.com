<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Release Space</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --shape-color: radial-gradient(circle, #a1c4fd 0%, #c2e9fb 100%);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #shape-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
        }

        /* The Pond Shape */
        #release-shape {
            width: 800px; /* Starts large */
            height: 800px;
            background: var(--shape-color);
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.9;
            box-shadow: 0 0 60px rgba(161, 196, 253, 0.4);
            transition: width 0.2s ease, height 0.2s ease, opacity 0.2s ease;
            animation: pulse 6s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.03); opacity: 0.9; }
        }

        /* Clean Controls */
        #controls {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px 20px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            gap: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            align-items: center;
        }

        label { 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            opacity: 0.6; 
            text-align: center;
        }

        /* The Slider - No pulsing, just a clean track */
        input[type=range] {
            writing-mode: bt-lr; /* Vertical slider for a more 'scale' feel */
            -webkit-appearance: none;
            width: 6px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        select, button {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 11px;
            opacity: 0.5;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="shape-container">
        <div id="release-shape"></div>
    </div>

    <div id="controls">
        <label>Release</label>
        <input type="range" id="sizeSlider" min="0" max="1000" value="0">
        <label>Hold</label>
        
        <div style="height: 20px;"></div>

        <label>Timer</label>
        <select id="timerSelect">
            <option value="0">Manual</option>
            <option value="30">30 Seconds</option>
            <option value="300">5 Minutes</option>
            <option value="900">15 Minutes</option>
            <option value="3600">1 Hour</option>
        </select>

        <button id="startBtn">Begin Letting Go</button>
    </div>

    <footer>
        &copy; 2026 YOUR NAME HERE. All rights reserved.
    </footer>

    <script>
        const shape = document.getElementById('release-shape');
        const sizeSlider = document.getElementById('sizeSlider');
        const timerSelect = document.getElementById('timerSelect');
        const startBtn = document.getElementById('startBtn');

        let releaseInterval;

        // Logic: 0 is 800px (Full), 1000 is 0px (Gone)
        function updateShapeFromSlider(sliderValue) {
            let size = 800 - (sliderValue * 0.8); 
            shape.style.width = size + 'px';
            shape.style.height = size + 'px';
            shape.style.opacity = (size / 800);
            
            if (size <= 10) shape.style.opacity = 0;
        }

        sizeSlider.addEventListener('input', (e) => {
            clearInterval(releaseInterval);
            updateShapeFromSlider(e.target.value);
        });

        startBtn.addEventListener('click', () => {
            clearInterval(releaseInterval);
            let duration = parseInt(timerSelect.value);
            if (duration === 0) return;

            let currentSliderVal = parseInt(sizeSlider.value);
            let remainingDistance = 1000 - currentSliderVal;
            let steps = duration * 20; // smoother updates
            let increment = remainingDistance / steps;

            releaseInterval = setInterval(() => {
                currentSliderVal += increment;
                sizeSlider.value = currentSliderVal;
                updateShapeFromSlider(currentSliderVal);

                if (currentSliderVal >= 1000) {
                    clearInterval(releaseInterval);
                    updateShapeFromSlider(1000);
                }
            }, 50); 
        });

        // Initialize
        updateShapeFromSlider(0);
    </script>
</body>
</html>
