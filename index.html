<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Luminous Gallery</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #050505; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        /* LAVA LAMP EFFECT: Blur reduced to 8px so shapes are crisp, loose, and blend organically */
        #bgCanvas { 
            position: absolute; top: 0; left: 0; z-index: 1; 
            filter: blur(8px); opacity: 1; 
        }
        
        #content {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: white; transition: opacity 1.5s ease;
            pointer-events: none; 
        }

        h1 { font-weight: 200; letter-spacing: 12px; text-transform: uppercase; font-size: 24px; margin-bottom: 10px; }
        .subtitle { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 50px; opacity: 0.6; }

        .choice-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; pointer-events: auto; }
        
        .card { 
            width: 180px; padding: 35px 20px; border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 4px; text-decoration: none; color: white; 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all 0.5s ease;
        }
        .card:hover { border-color: rgba(255, 255, 255, 0.6); transform: translateY(-5px); }
        .card h2 { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }
        .card p { font-size: 10px; opacity: 0.6; line-height: 1.6; margin: 0; }

        /* HEADER SECTION */
        #top-ui { 
            position: absolute; top: 40px; width: 100%; display: flex; 
            justify-content: center; align-items: center; gap: 20px; z-index: 100; 
        }

        /* FOOTER SECTION */
        #bottom-ui {
            position: absolute; bottom: 40px; width: 100%; display: flex;
            justify-content: center; align-items: center; gap: 20px; z-index: 100;
            transition: opacity 0.8s ease;
        }

        .ui-element { 
            font-size: 9px; letter-spacing: 3px; text-transform: uppercase; 
            background: rgba(20,20,20,0.8); border: 1px solid rgba(255,255,255,0.2); 
            color: white; padding: 10px 18px; cursor: pointer; pointer-events: auto;
            text-decoration: none; border-radius: 4px; transition: all 0.3s ease;
            font-family: inherit;
        }
        .ui-element:hover { border-color: rgba(255, 255, 255, 0.6); }
        .ui-element.active-state { border-color: #fca5a5; color: #fca5a5; }

        /* Observation Mode Isolation */
        .observe-active #content, .observe-active #bottom-ui { opacity: 0.02; pointer-events: none; }
        .observe-active #top-ui { opacity: 0.15; }
        .observe-active #top-ui:hover { opacity: 1; }
    </style>
</head>

            ocean: 'https://assets.mixkit.co/active_storage/sfx/2513/2513-84.wav', // Crashing ocean rhythm

        };

        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let shapes = [], audioCtx, oscillator, gainNode;
        const natureAudio = document.getElementById('nature-audio');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- MEDITATIVE DRIFT PHYSICS SYSTEM ---
        class LuminousBlob {
            constructor() {
                this.radius = Math.random() * 140 + 160;
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // SLOWED DOWN: Vector speed scaled down by 50% for a luxurious, liquid drift
                this.vx = (Math.random() - 0.5) * 0.55;
                this.vy = (Math.random() - 0.5) * 0.55;
                
                // RESTORED VIBRANT COLORS (Vibrant yet relaxing)
                this.color = [
                    'rgba(62, 207, 114, 0.65)',  /* Vibrant Emerald */
                    'rgba(240, 185, 48, 0.65)',  /* Warm Amber */
                    'rgba(110, 122, 237, 0.65)', /* Radiant Lavender */
                    'rgba(34, 197, 219, 0.65)',  /* True Cyan */
                    'rgba(235, 103, 103, 0.60)'  /* Rich Coral */
                ][Math.floor(Math.random() * 5)];
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        for(let i=0; i<12; i++) shapes.push(new LuminousBlob());

        function animate() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            shapes.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // --- FULLSCREEN INTERACTION CONTROLLER ---
        function toggleObserve() {
            const body = document.getElementById('main-body');
            const btn = document.getElementById('obs-btn');
            body.classList.toggle('observe-active');
            
            const isObserving = body.classList.contains('observe-active');
            btn.innerText = isObserving ? "Observation: On" : "Observation: Off";

            if (isObserving) {
                btn.classList.add('active-state');
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
                else if (document.documentElement.webkitRequestFullscreen) document.documentElement.webkitRequestFullscreen();
            } else {
                btn.classList.remove('active-state');
                if (document.fullscreenElement || document.webkitFullscreenElement) {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                }
            }
        }
