<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Release Space</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --shape-color: radial-gradient(circle, #a1c4fd 0%, #c2e9fb 100%);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #shape-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
        }

        #release-shape {
            /* Starts at the largest size */
            width: 1000px;
            height: 1000px;
            background: var(--shape-color);
            border-radius: 50%;
            filter: blur(30px);
            opacity: 1;
            box-shadow: 0 0 50px rgba(161, 196, 253, 0.5);
            transition: width 0.1s linear, height 0.1s linear, opacity 0.1s linear;
            animation: pulse 5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.02); opacity: 1; }
        }

        #controls {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
        input[type=range] { width: 150px; cursor: pointer; }

        button {
            margin-top: 10px;
            cursor: pointer;
            padding: 10px;
            border-radius: 5px;
            border: none;
            background: #a1c4fd;
            color: #0b0e14;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        button:hover { background: #c2e9fb; }

        footer {
            position: absolute;
            bottom: 15px;
            font-size: 10px;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div id="shape-container">
        <div id="release-shape"></div>
    </div>

    <div id="controls">
        <label>Manual Size</label>
        <input type="range" id="sizeSlider" min="0" max="1000" value="1000">
        
        <label>Release Timer</label>
        <select id="timerSelect">
            <option value="0">Manual Only</option>
            <option value="10">10 Seconds</option>
            <option value="30">30 Seconds</option>
            <option value="300">5 Minutes</option>
        </select>

        <button id="startBtn">begin release</button>
    </div>

    <footer>
        &copy; 2026 Release by Ava. All rights reserved.
    </footer>

    <script>
        const shape = document.getElementById('release-shape');
        const sizeSlider = document.getElementById('sizeSlider');
        const timerSelect = document.getElementById('timerSelect');
        const startBtn = document.getElementById('startBtn');

        let releaseInterval;

        // Manual Control
        sizeSlider.addEventListener('input', (e) => {
            updateShape(e.target.value);
            clearInterval(releaseInterval); 
        });

        function updateShape(size) {
            shape.style.width = size + 'px';
            shape.style.height = size + 'px';
            // Opacity decreases as size goes to 0
            shape.style.opacity = (size / 1000);
            
            if (size <= 0) {
                shape.style.display = 'none';
            } else {
                shape.style.display = 'block';
            }
        }

        // Automatic Release Logic (Largest to Gone)
        startBtn.addEventListener('click', () => {
            clearInterval(releaseInterval);
            let duration = parseInt(timerSelect.value);
            if (duration === 0) return;

            let currentSize = parseFloat(sizeSlider.value);
            let intervalMs = 100; // Update every 100ms
            let totalSteps = (duration * 1000) / intervalMs;
            let sizeReductionPerStep = currentSize / totalSteps;

            releaseInterval = setInterval(() => {
                currentSize -= sizeReductionPerStep;
                
                if (currentSize <= 0) {
                    currentSize = 0;
                    clearInterval(releaseInterval);
                }
                
                sizeSlider.value = currentSize;
                updateShape(currentSize);
            }, intervalMs);
        });
