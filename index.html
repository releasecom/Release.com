<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Luminous Gallery</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; filter: blur(45px); opacity: 0.8; transition: opacity 2s ease; }
        
        #content {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: white; transition: opacity 2s ease;
        }

        h1 { font-weight: 200; letter-spacing: 15px; text-transform: uppercase; font-size: 24px; margin-bottom: 10px; transition: opacity 2s; }
        .subtitle { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 50px; opacity: 0.5; transition: opacity 2s; }

        #breath-pacer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 350px; height: 350px; border: 1px solid rgba(255,255,255,0.03);
            border-radius: 50%; animation: breathe 8s infinite ease-in-out;
            pointer-events: none; z-index: 5;
        }

        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.1; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.25; }
        }

        .choice-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; transition: opacity 2s; }
        .card { 
            width: 180px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 2px; text-decoration: none; color: white; 
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
            transition: all 0.5s ease; pointer-events: auto;
        }
        .card:hover { border-color: rgba(255, 255, 255, 0.4); transform: translateY(-5px); }
        .card h2 { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; font-weight: 400; }
        .card p { font-size: 10px; opacity: 0.4; line-height: 1.6; }

        /* Controls UI */
        #top-ui { 
            position: absolute; top: 30px; width: 100%; display: flex; 
            justify-content: center; align-items: center; gap: 30px; z-index: 20; 
        }

        .ui-element { 
            font-size: 9px; letter-spacing: 3px; text-transform: uppercase; 
            background: none; border: 1px solid rgba(255,255,255,0.15); 
            color: rgba(255,255,255,0.5); padding: 8px 15px; cursor: pointer; 
            transition: all 0.4s; pointer-events: auto;
        }
        .ui-element:hover { color: white; border-color: white; }

        select.ui-element { background: #050505; color: white; border-radius: 0; outline: none; }

        /* Observation Mode State */
        .observe-active h1, 
        .observe-active .subtitle, 
        .observe-active .card { opacity: 0.03; }
        .observe-active .card:hover { opacity: 0.8; } /* Allows cards to be visible only on hover */
    </style>
</head>
<body id="main-body">
    <div id="breath-pacer"></div>
    <canvas id="bgCanvas"></canvas>
    
    <div id="top-ui">
        <div class="ui-element" id="observe-btn" onclick="toggleObserve()">Observation
