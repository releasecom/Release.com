<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Luminous Gallery</title>

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; }
        
        /* Fixed Canvas Visibility */
        canvas { position: absolute; top: 0; left: 0; z-index: 1; filter: blur(50px); opacity: 0.9; }
        
        #content {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: white; transition: opacity 1.5s ease;
            pointer-events: none; /* Allows clicks to pass through to the UI elements */
        }

        h1 { font-weight: 200; letter-spacing: 12px; text-transform: uppercase; font-size: 24px; margin-bottom: 10px; transition: opacity 1.5s; }
        .subtitle { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 50px; opacity: 0.5; transition: opacity 1.5s; }

        #breath-pacer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px; border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50%; animation: breathe 8s infinite ease-in-out;
            pointer-events: none; z-index: 5;
        }

        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.1; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.3; }
        }

        .choice-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; pointer-events: auto; transition: opacity 1.5s; }

            transition: all 0.5s ease;
        }
