<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Luminous Gallery</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #080808; font-family: 'Segoe UI', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; filter: blur(60px); opacity: 0.6; }
        
        #content {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: white; pointer-events: none;
        }

        h1 { font-weight: 200; letter-spacing: 15px; text-transform: uppercase; font-size: 24px; margin-bottom: 10px; }
        .subtitle { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 50px; opacity: 0.5; }

        .choice-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; pointer-events: auto; }
        .card { 
            width: 180px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 4px; text-decoration: none; color: white; 
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }
        .card:hover { border-color: rgba(255, 255, 255, 0.5); transform: translateY(-5px); }
        .card h2 { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .card p { font-size: 10px; opacity: 0.6; line-height: 1.6; }

        #audio-hint { position: absolute; top: 20px; font-size: 9px; letter-spacing: 3px; opacity: 0.3; text-transform: uppercase; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div id="content">
        <div id="audio-hint" onclick="startMiracleTone()">Click to Listen (528Hz)</div>
        <h1>The Luminous Gallery</h1>
        <div class="subtitle">A Sanctuary for Processing</div>

        <div class="choice-container">
            <a href="release.html" class="card"><h2>The Release</h2><p>Settle the noise.</p></a>
            <a href="gallery.html" class="card"><h2>Liminal Void</h2><p>Radiate energy.</p></a>
            <a href="forge.html" class="card"><h2>The Forge</h2><p>Expel the weight.</p></a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let shapes = [];
        let audioCtx;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class FloatingShape {
            constructor() {
                this.radius = Math.random() * 150 + 100;
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.color = ['#3a5a40', '#ccb28a', '#8181b5'][Math.floor(Math.random()*3)];
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        for(let i=0; i<6; i++) shapes.push(new FloatingShape());

        function animate() {
            ctx.fillStyle = '#080808';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            shapes.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        function startMiracleTone() {
            if (audioCtx) return;
            audioCtx = new AudioContext();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(528, audioCtx.currentTime); // 528Hz Miracle Frequency
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            document.getElementById('audio-hint').innerText = "Vibrating at 528Hz";
        }
    </script>
</body>
</html>
