<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Luminous Gallery</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #050505; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        /* Persistent Background Canvas Layer */
        #bgCanvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
            filter: blur(30px); 
            opacity: 1; 
        }
        
        /* Master Layout Container */
        #content {
            position: relative; 
            z-index: 10; 
            height: 100%;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            text-align: center; 
            color: white; 
            transition: opacity 1.5s ease;
            pointer-events: none; 
        }

        h1 { 
            font-weight: 200; 
            letter-spacing: 12px; 
            text-transform: uppercase; 
            font-size: 24px; 
            margin-bottom: 10px; 
        }
        
        .subtitle { 
            font-size: 10px; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            margin-bottom: 50px; 
            opacity: 0.6; 
        }

        /* Navigational Portals Grid */
        .choice-container { 
            display: flex; 
            gap: 20px; 
            flex-wrap: wrap; 
            justify-content: center; 
            pointer-events: auto; 
            transition: opacity 1.5s; 
        }
        
        .card { 
            width: 180px; 
            padding: 35px 20px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 4px; 
            text-decoration: none; 
            color: white; 
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all 0.5s ease;
        }
        
        .card:hover { 
            border-color: rgba(255, 255, 255, 0.6); 
            transform: translateY(-5px); 
        }
        
        .card h2 { 
            font-size: 11px; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            margin-bottom: 12px; 
        }
        
        .card p { 
            font-size: 10px; 
            opacity: 0.6; 
            line-height: 1.6; 
            margin: 0;
        }

        /* Header Control Strip */
        #top-ui { 
            position: absolute; 
            top: 40px; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 20px; 
            z-index: 100; 
        }

        .ui-element { 
            font-size: 9px; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            background: rgba(20,20,20,0.8); 
            border: 1px solid rgba(255,255,255,0.2); 
            color: white; 
            padding: 10px 18px; 
            cursor: pointer; 
            pointer-events: auto;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .ui-element:hover { 
            border-color: rgba(255, 255, 255, 0.6); 
        }
        
        .ui-element.active-state { 
            border-color: #fca5a5; 
            color: #fca5a5; 
        }

        /* Observation Mode Dynamic Overrides */
        .observe-active #content { opacity: 0.02; }
        .observe-active #content:hover { opacity: 0.9; }
    </style>
</head>
<body id="main-body">

    <canvas id="bgCanvas"></canvas>
    
    <div id="top-ui">
        <button class="ui-element" onclick="toggleObserve()" id="obs-btn">Observation: Off</button>
        <a href="podcast.html" class="ui-element">Thinking Well Podcast</a>
        <a href="imagery.html" class="ui-element">Regulatory Imagery</a>
        
        <select class="ui-element" id="freq-select" onchange="updateSoundscape()">
            <option value="none">Silent Sanctuary</option>
            <optgroup label="Solfeggio Frequencies">
                <option value="528">528Hz - Transformation & Miracle</option>
                <option value="417">417Hz - Clearing Negativity</option>
                <option value="174">174Hz - Foundation & Pain Relief</option>
            </optgroup>
            <optgroup label="Nature Soundscapes">
                <option value="rain">Nervous System Rainfall</option>
                <option value="forest">Biophilic Forest Ambience</option>
            </optgroup>
            <optgroup label="Meditative Soundscapes">
                <option value="drone">Deep Cosmic Grounding Drone</option>
            </optgroup>
        </select>
    </div>

    <audio id="nature-audio" loop></audio>

    <div id="content">
        <h1>The Luminous Gallery</h1>
        <div class="subtitle">A Sanctuary for Processing</div>
        <div class="choice-container">
            <a href="release.html" class="card"><h2>The Release</h2><p>Dissolve the noise.</p></a>
            <a href="gallery.html" class="card"><h2>Liminal Void</h2><p>Radiate energy.</p></a>
            <a href="forge.html" class="card"><h2>The Forge</h2><p>Expel the weight.</p></a>
        </div>
    </div>

    <script>
        // --- PRODUCTION MEDIA SOURCE MATRIX ---
        const soundscapes = {
            rain: 'https://actions.google.com/sounds/v1/ambiences/rain_heavy_loud.ogg',
            forest: 'https://actions.google.com/sounds/v1/ambiences/morning_birds.ogg',
            drone: 'https://actions.google.com/sounds/v1/ambiences/ambient_hum_air_conditioner.ogg'
        };

        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let shapes = [], audioCtx, oscillator, gainNode;
        const natureAudio = document.getElementById('nature-audio');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- HOMESCREEN DRIFT ENGINE (RESTORED ORIGINAL KINETICS & KINEMATICS) ---
        class LuminousBlob {
            constructor() {
                // Restored large cloud dimensions
                this.radius = Math.random() * 150 + 150;
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Restored original continuous velocity calculations
                this.vx = (Math.random() - 0.5) * 1.2;
                this.vy = (Math.random() - 0.5) * 1.2;
                
                // INTEGRATED SCIENTIFIC PALETTE: Restorative pastels and biological earth tones
                this.color = [
                    'rgba(143, 161, 148, 0.45)', /* Sage Mist */
                    'rgba(167, 161, 184, 0.45)', /* Twilight Lavender */
                    'rgba(212, 197, 185, 0.40)', /* Sand Linen */
                    'rgba(107, 124, 133, 0.45)', /* Abyssal Slate */
                    'rgba(220, 174, 150, 0.35)'  /* Pale Terracotta */
                ][Math.floor(Math.random() * 5)];
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        for(let i=0; i<12; i++) shapes.push(new LuminousBlob());

        function animate() {
            ctx.fillStyle = '#050505'; // Crisper dark base value
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            shapes.forEach(s => {
                s.update();
                s.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- FULLSCREEN ISOLATION UTILITY ---
        function toggleObserve() {
            const body = document.getElementById('main-body');
            const btn = document.getElementById('obs-btn');
            body.classList.toggle('observe-active');
            
            const isObserving = body.classList.contains('observe-active');
            btn.innerText = isObserving ? "Observation: On" : "Observation: Off";

            if (isObserving) {
                btn.classList.add('active-state');
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen();
                }
            } else {
                btn.classList.remove('active-state');
                if (document.fullscreenElement || document.webkitFullscreenElement) {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                }
            }
        }

        // --- HYBRID AUDIO CONTROLLER (HERTZ GENERATOR + SOUNDSCAPE PIPELINES) ---
        function updateSoundscape() {
            const selection = document.getElementById('freq-select').value;
            
            // Step 1: Default Teardowns
            if (gainNode) {
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            }
            natureAudio.pause();

            if (selection === 'none') return;

            // Step 2: Handle Audio File Streams (Nature/Meditation)
            if (isNaN(selection)) {
                natureAudio.src = soundscapes[selection];
                natureAudio.play().catch(e => console.log("System navigation interaction required."));
                return;
            }

            // Step 3: Handle Mathematical Frequency Synthesis (Hz options)
            const targetFrequency = parseFloat(selection);
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                oscillator = audioCtx.createOscillator();
                gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
            }
            
            oscillator.frequency.exponentialRampToValueAtTime(targetFrequency, audioCtx.currentTime + 0.8);
            gainNode.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 1.0); // Safe, regulated volume ceilings
        }
    </script>
</body>
</html>
