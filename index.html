<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Release Space</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --shape-color: radial-gradient(circle, #a1c4fd 0%, #c2e9fb 100%);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #shape-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
        }

        #release-shape {
            /* Width and height are controlled by JS on load */
            background: var(--shape-color);
            border-radius: 50%;
            filter: blur(30px);
            box-shadow: 0 0 50px rgba(161, 196, 253, 0.5);
            transition: width 0.1s linear, height 0.1s linear, opacity 0.1s linear;
            animation: pulse 5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        #controls {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }
        input[type=range] { width: 150px; cursor: pointer; }

        /* Updated white button style */
        button {
            margin-top: 10px;
            cursor: pointer;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #ffffff;
            color: #0b0e14;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            background: #f0f0f0;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255,255,255,0.1);
        }

        button:active {
            transform: translateY(1px);
        }

        footer {
            position: absolute;
            bottom: 15px;
            font-size: 10px;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div id="shape-container">
        <div id="release-shape"></div>
    </div>

    <div id="controls">
        <label>Size your stressor</label>
        <input type="range" id="sizeSlider" min="0" max="800" value="400">
        
        <label>Release Timer</label>
        <select id="timerSelect">
            <option value="10">10 Seconds</option>
            <option value="30">30 Seconds</option>
            <option value="300">5 Minutes</option>
        </select>

        <button id="startBtn">begin release</button>
    </div>

    <footer>
        &copy; 2026 Release by Ava. All rights reserved.
    </footer>

    <script>
        const shape = document.getElementById('release-shape');
        const sizeSlider = document.getElementById('sizeSlider');
        const timerSelect = document.getElementById('timerSelect');
        const startBtn = document.getElementById('startBtn');

        let releaseInterval;

        // Function to update visuals
        function updateShape(size) {
            shape.style.width = size + 'px';
            shape.style.height = size + 'px';
            
            // Opacity fades as it gets smaller
            // (size / max slider value)
            let opacityValue = (size / 800) + 0.1; 
            shape.style.opacity = size <= 0 ? 0 : opacityValue;
        }

        // Manual Slider Control - Immediate response
        sizeSlider.addEventListener('input', () => {
            clearInterval(releaseInterval); // Stop any ongoing animation
            updateShape(sizeSlider.value);
        });

        // Automatic Release Logic
        startBtn.addEventListener('click', () => {
            clearInterval(releaseInterval);
            
            let duration = parseInt(timerSelect.value);
            let currentSize = parseFloat(sizeSlider.value);
            
            if (currentSize <= 0) return; // Nothing to release

            const intervalMs = 50; // Smoother updates at 50ms
            const totalSteps = (duration * 1000) / intervalMs;
            const sizeReductionPerStep = currentSize / totalSteps;

            releaseInterval = setInterval(() => {
                currentSize -= sizeReductionPerStep;
                
                if (currentSize <= 0) {
                    currentSize = 0;
                    clearInterval(releaseInterval);
                }
                
                sizeSlider.value = currentSize;
                updateShape(currentSize);
            }, intervalMs);
        });

        // Initial Load
        updateShape(400);
    </script>
</body>
</html>
