<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Luminous Gallery</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; filter: blur(45px); opacity: 0.8; }
        
        #content {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: white; pointer-events: none;
        }

        h1 { font-weight: 200; letter-spacing: 15px; text-transform: uppercase; font-size: 24px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .subtitle { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 50px; opacity: 0.5; }

        /* The Breath Anchor */
        #breath-pacer {
            position: absolute; width: 300px; height: 300px;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50%;
            animation: breathe 8s infinite ease-in-out;
            pointer-events: none; z-index: 5;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(0.8); opacity: 0.1; }
            50% { transform: scale(1.2); opacity: 0.3; }
        }

        .choice-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; pointer-events: auto; }
        .card { 
            width: 180px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 2px; text-decoration: none; color: white; 
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .card:hover { border-color: rgba(255, 255, 255, 0.4); transform: translateY(-8px); background: rgba(255, 255, 255, 0.05); }

        #audio-trigger { 
            position: absolute; top: 30px; pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px;
            font-size: 9px; letter-spacing: 4px; opacity: 0.4; text-transform: uppercase; 
            cursor: pointer; transition: all 0.4s;
        }
        #audio-trigger:hover { opacity: 1; border-color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div id="breath-pacer"></div>
    <canvas id="bgCanvas"></canvas>
    
    <div id="content">
        <div id="audio-trigger" onclick="startMiracleTone()">Initiate 528Hz Sanctuary</div>
        <h1>The Luminous Gallery</h1>
        <div class="subtitle">A Sanctuary for Processing</div>
        
        <div class="choice-container">
            <a href="release.html" class="card"><h2>The Release</h2></a>
            <a href="gallery.html" class="card"><h2>Liminal Void</h2></a>
            <a href="forge.html" class="card"><h2>The Forge</h2></a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let shapes = [], audioCtx;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class LuminousBlob {
            constructor() {
                this.radius = Math.random() * 200 + 150;
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 1.8;
                this.vy = (Math.random() - 0.5) * 1.8;
                this.color = ['#2d4a3e', '#b89d70', '#5e5e8a', '#1e3a47'][Math.floor(Math.random()*4)];
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < -100 || this.x > canvas.width + 100) this.vx *= -1;
                if (this.y < -100 || this.y > canvas.height + 100) this.vy *= -1;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
        }

        for(let i=0; i<8; i++) shapes.push(new LuminousBlob());

        function animate() {
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            shapes.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        function startMiracleTone() {
            if (audioCtx) return;
            audioCtx = new AudioContext();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(528, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            document.getElementById('audio-trigger').innerText = "Sanctuary Active (528Hz)";
            document.getElementById('audio-trigger').style.borderColor = "transparent";
        }
    </script>
</body>
</html>
